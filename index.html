<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรแกรมคำนวณ BMI & กล่องข้าวสุขภาพ</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        input[type="number"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }
        button {
            width: 100%;
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }
        button:hover {
            background-color: #27ae60;
        }
        .result-box {
            display: none;
            margin-top: 25px;
            border-top: 2px dashed #ccc;
            padding-top: 20px;
        }
        .bmi-badge {
            padding: 15px;
            border-radius: 8px;
            color: white;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        /* ดีไซน์กล่องข้าว Bento Box */
        .bento-box {
            background-color: #4A3E3D;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            color: #333;
        }
        .bento-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            grid-gap: 10px;
        }
        .bento-cell {
            background-color: #FFFDF9;
            border-radius: 8px;
            padding: 12px;
            box-sizing: border-box;
        }
        .bento-main {
            border: 3px solid #D9534F;
            min-height: 120px;
        }
        .bento-side-container {
            display: grid;
            grid-template-rows: 1fr 1fr;
            grid-gap: 10px;
        }
        .bento-side1 { border: 3px solid #F0AD4E; }
        .bento-side2 { border: 3px solid #5CB85C; }
        .bento-snack {
            border: 3px solid #5BC0DE;
            margin-top: 10px;
        }
        .badge {
            display: inline-block;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .food-text {
            font-weight: bold;
            font-size: 14px;
            margin: 0;
        }
        .todo-section {
            margin-top: 20px;
        }
        .todo-section ul {
            padding-left: 20px;
        }
        .todo-section li {
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🍱 BMI & กล่องข้าวสุขภาพ</h1>
    
    <div class="form-group">
        <label>เพศ</label>
        <div class="radio-group">
            <label><input type="radio" name="gender" value="ชาย" checked> ชาย</label>
            <label><input type="radio" name="gender" value="หญิง"> หญิง</label>
        </div>
    </div>

    <div class="form-group">
        <label for="weight">น้ำหนัก (กิโลกรัม)</label>
        <input type="number" id="weight" value="60" step="0.1">
    </div>

    <div class="form-group">
        <label for="height">ส่วนสูง (เซนติเมตร)</label>
        <input type="number" id="height" value="165" step="0.1">
    </div>

    <button onclick="calculateBMI()">คำนวณและจัดกล่องข้าว</button>

    <div id="result" class="result-box">
        <h3>📊 ผลการประมวลผล</h3>
        <div id="bmiBadge" class="bmi-badge"></div>
        
        <h3>🍱 กล่องข้าวของคุณวันนี้</h3>
        <div class="bento-box">
            <div class="bento-grid">
                <div class="bento-cell bento-main">
                    <span class="badge" style="background-color: #D9534F;">อาหารจานหลัก</span>
                    <p class="food-text" id="menuMain"></p>
                </div>
                <div class="bento-side-container">
                    <div class="bento-cell bento-side1">
                        <span class="badge" style="background-color: #F0AD4E;">เครื่องเคียง 1</span>
                        <p class="food-text" id="menuSide1"></p>
                    </div>
                    <div class="bento-cell bento-side2">
                        <span class="badge" style="background-color: #5CB85C;">ผัก/วิตามิน</span>
                        <p class="food-text" id="menuSide2"></p>
                    </div>
                </div>
            </div>
            <div class="bento-cell bento-snack">
                <span class="badge" style="background-color: #5BC0DE;">ของว่าง / ผลไม้</span>
                <p class="food-text" id="menuSnack"></p>
            </div>
        </div>

        <div class="todo-section">
            <h3>🏃‍♂️ สิ่งที่ควรทำ (Action Plan)</h3>
            <ul id="todoList"></ul>
        </div>
    </div>
</div>

<script>
function calculateBMI() {
    const weight = parseFloat(document.getElementById('weight').value);
    const heightCm = parseFloat(document.getElementById('height').value);
    const gender = document.querySelector('input[name="gender"]:checked').value;
    
    if (!weight || !heightCm) {
        alert("กรุณากรอกข้อมูลให้ครบถ้วนครับ");
        return;
    }

    const heightM = heightCm / 100;
    const bmi = weight / (heightM * heightM);
    
    let status = "";
    let color = "";
    let todo = [];
    let bento = { main: "", side1: "", side2: "", snack: "" };

    // แบ่งเกณฑ์ BMI และจัดเมนูตามความเหมาะสม
    if (bmi < 18.5) {
        status = "น้ำหนักน้อยกว่ามาตรฐาน (ผอม)";
        color = "#FFC107";
        todo = [
            "เน้นการออกกำลังกายแบบแรงต้าน (Weight Training) เพื่อสร้างมวลกล้ามเนื้อ",
            "เพิ่มมื้อย่อยระหว่างวันเป็น 5-6 มื้อ",
            "ดื่มน้ำให้เพียงพอ แต่เลี่ยงการดื่มน้ำเยอะๆ ก่อนมื้ออาหาร"
        ];
        bento = {
            main: "ข้าวกล้อง + อกไก่ผัดเม็ดมะม่วงหิมพานต์ (เพิ่มไขมันดี)",
            side1: "ไข่ต้ม 2 ฟอง",
            side2: "สลัดอะโวคาโดถั่วรวม",
            snack: "กล้วยหอม + นมมอลต์ข้น"
        };
    } else if (bmi >= 18.5 && bmi < 23.0) {
        status = "น้ำหนักปกติ (สุขภาพดี)";
        color = "#28A745";
        todo = [
            "รักษามาตรฐานนี้ไว้! ออกกำลังกายคาร์ดิโอควบคู่เวทเทรนนิ่ง 150 นาที/สัปดาห์",
            "เน้นทานอาหารหลากหลายให้ครบ 5 หมู่",
            "นอนหลับพักผ่อนให้เพียงพอ 7-8 ชั่วโมงต่อวัน"
        ];
        bento = {
            main: "ข้าวไรซ์เบอร์รี่ + ปลากะพงนึ่งซีอิ๊ว",
            side1: "ไข่ม้วนญี่ปุ่น",
            side2: "บล็อคโคลี่และแครอทต้ม",
            snack: "แก้วมังกร หรือ ฝรั่งสด"
        };
    } else if (bmi >= 23.0 && bmi < 25.0) {
        status = "น้ำหนักเกิน (ท้วม)";
        color = "#FD7E14";
        todo = [
            "ควบคุมปริมาณแคลอรีที่ได้รับต่อวันอย่างพอดี",
            "เพิ่มกิจกรรมทางกาย เช่น เดินเร็ว วิ่งเหยาะๆ 30-45 นาที/วัน",
            "ลดการทานของทอด ของมัน และอาหารแปรรูป"
        ];
        bento = {
            main: "ข้าวกล้องน้อย + ลาบไก่สับ (ใช้น้ำมันน้อย/เลี่ยงหนัง)",
            side1: "เต้าหู้ขาวนึ่ง",
            side2: "ผักต้มจิ้มน้ำพริก",
            snack: "โยเกิร์ตรสธรรมชาติ 0% ไขมัน"
        };
    } else if (bmi >= 25.0 && bmi < 30.0) {
        status = "โรคอ้วนระดับ 1";
        color = "#DC3545";
        todo = [
            "ตั้งเป้าหมายลดน้ำหนักอย่างปลอดภัย (ประมาณ 0.5 กิโลกรัม/สัปดาห์)",
            "เน้นคาร์ดิโอความเข้มข้นปานกลาง เช่น เดินเร็วหรือว่ายน้ำ เพื่อเซฟข้อต่อ",
            "งดเครื่องดื่มชงหวานๆ น้ำอัดลม และขนมขบเคี้ยว"
        ];
        bento = {
            main: "อกไก่ย่างเกลือพริกไทย + ฟักทองนึ่ง (แทนข้าว)",
            side1: "ไข่ตุ๋นเนื้อเนียน",
            side2: "กวางตุ้งผัดน้ำมันหอยสูตรโซเดียมต่ำ",
            snack: "แอปเปิ้ลเขียว 1 ลูก"
        };
    } else {
        status = "โรคอ้วนระดับ 2 (อ้วนมาก)";
        color = "#721C24";
        todo = [
            "แนะนำให้ปรึกษาแพทย์หรือนักโภชนาการร่วมด้วยเพื่อความปลอดภัย",
            "ออกกำลังกายในน้ำเพื่อลดแรงกระแทกที่ข้อเข่า",
            "ควบคุมคาร์โบไฮเดรตและน้ำตาลอย่างเข้มงวด เน้นโปรตีนและผักใบเขียว"
        ];
        bento = {
            main: "สเต็กปลาแซลมอนย่าง (ไม่ใช้น้ำมัน) + ผักย่าง",
            side1: "ไข่ขาวต้ม 3 ฟอง",
            side2: "ซุปมิโซะใส่เต้าหู้และสาหร่าย",
            snack: "ผลไม้ตระกูลเบอร์รี่หนึ่งกำมือ"
        };
    }

    // แสดงผลบนหน้าจอ
    document.getElementById('bmiBadge').style.backgroundColor = color;
    document.getElementById('bmiBadge').innerHTML = `เพศ: ${gender} | ค่า BMI: ${bmi.toFixed(2)}<br><small>เกณฑ์: ${status}</small>`;
    
    // ใส่ข้อมูลกล่องข้าว
    document.getElementById('menuMain').innerText = bento.main;
    document.getElementById('menuSide1').innerText = bento.side1;
    document.getElementById('menuSide2').innerText = bento.side2;
    document.getElementById('menuSnack').innerText = bento.snack;
    
    // ใส่สิ่งทีควรทำ
    const todoList = document.getElementById('todoList');
    todoList.innerHTML = "";
    todo.forEach(item => {
        let li = document.createElement('li');
        li.innerText = item;
        todoList.appendChild(li);
    });

    // เปิดการแสดงผลกล่องผลลัพธ์
    document.getElementById('result').style.display = 'block';
}
</script>

</body>
</html>
